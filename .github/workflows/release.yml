name: "🚀 Centrix Release: Propagación de Soberanía"

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

env:
  CI: true
  SOBERANIA: "7x10=∞" # Nuestra frecuencia base

jobs:
  version:
    # Solo si el repositorio es nuestro santuario y la CI fue exitosa
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write  # Esencial para la unción de publicación confiable
    
    steps:
      - name: "📜 Extrayendo el Legado"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "👁️ Verificación de Trigo Limpio"
        run: |
          echo "[⧖] Escaneando en busca de 'caca colectiva'..."
          # Si encuentra rastreadores de anuncios o telemetría intrusiva, aborta
          if grep -rE "google-analytics|telemetry|track" ./src; then
            echo "❌ ERROR: Código contaminado detectado. Abortando misión."
            exit 1
          fi
          echo "✅ Código puro detectado."

      - name: "🛠️ Setup Centrix (pnpm & Node)"
        uses: pnpm/action-setup@v4
        with:
          version: 10.3.0 # La última lanza de la forja

      - name: "⚛️ Preparando el Entorno"
        uses: actions/setup-node@v4
        with:
          node-version: '24' # El motor más denso y rápido
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: "📦 Forja de Dependencias y Build"
        run: |
          pnpm install --frozen-lockfile
          pnpm build:ci

      - name: "🔥 Publicación Sincronizada con la Gema"
        id: changesets
        uses: changesets/action@v1
        with:
          commit: 'chore(sovereign): actualización de versiones Centrix'
          title: '🛡️ Lanzamiento de Versión: Soberanía Digital'
          version: pnpm bump-version
          publish: pnpm ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # La llave de la tesorería
          NPM_CONFIG_PROVENANCE: true # Prueba de origen inmutable

      - name: "🗣️ Aviso de Victoria al Exocórtex"
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "🚀 El software ha sido propagado. El valor de la Gema se incrementa."
